<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klasifikasi Penyakit Tanaman Kentang</title>
  <meta name="description" content="Klasifikasi Penyakit Tanaman Kentang Menggunakan Neural Network">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="card">
    <h1>Klasifikasi Penyakit Tanaman <span class="accent">Kentang</span></h1>
    <p class="subtitle">Unggah gambar daun tanaman kentang untuk mendeteksi penyakit</p>

    <div id="drop-zone" class="drop-zone">
      <img id="preview" class="preview-img" alt="Preview">
      <div id="drop-text" class="drop-text">
        <p>Drag & drop atau klik untuk upload</p>
        <small>JPG, PNG, JPEG</small>
      </div>
      <input type="file" id="file-input" accept="image/*" hidden>
    </div>

    <button id="classify-btn" class="btn btn-primary" disabled>Proses</button>
    <div id="status" class="status">Tunggu sebentar ya, lagi memuat model</div>

    <div class="labels">
      <span class="label label-amber">Bercak Daun Awal</span>
      <span class="label label-red">Hawar Daun Lanjut</span>
      <span class="label label-green">Sehat</span>
    </div>

    <div id="results" class="results" hidden>
      <div class="results-divider"></div>
      <h2 class="results-title">Hasil Klasifikasi</h2>
      <div id="result-class" class="result-class"></div>
      <div id="result-confidence" class="result-confidence"></div>
      <p id="result-description" class="result-description"></p>
    </div>

    <footer>
      Created by <a href="https://github.com/hairulanaam/" target="_blank">Hairul Anam</a>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
